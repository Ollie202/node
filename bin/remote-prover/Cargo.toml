[package]
authors.workspace      = true
description            = "Miden remote prover"
edition.workspace      = true
homepage.workspace     = true
keywords               = ["miden", "prover", "remote"]
license.workspace      = true
name                   = "miden-remote-prover"
readme                 = "README.md"
repository.workspace   = true
rust-version.workspace = true
version.workspace      = true

[lints]
workspace = true

[dependencies]
anyhow                 = { workspace = true }
async-trait            = { workspace = true }
clap                   = { features = ["env"], workspace = true }
humantime              = { workspace = true }
miden-block-prover     = { workspace = true }
miden-node-proto       = { workspace = true }
miden-node-proto-build = { features = ["internal"], workspace = true }
miden-node-utils       = { workspace = true }
miden-protocol         = { features = ["std"], workspace = true }
miden-tx               = { features = ["concurrent", "std"], workspace = true }
miden-tx-batch-prover  = { features = ["std"], workspace = true }
opentelemetry          = { workspace = true }
tokio                  = { features = ["full"], workspace = true }
tokio-stream           = { features = ["net"], workspace = true }
tonic                  = { default-features = false, features = ["codegen", "router", "transport"], workspace = true }
tonic-health           = { workspace = true }
tonic-reflection       = { workspace = true }
tonic-web              = { workspace = true }
tower-http             = { features = ["trace"], workspace = true }
tracing                = { workspace = true }

[dev-dependencies]
assert_matches = { workspace = true }
miden-protocol = { features = ["testing"], workspace = true }
miden-testing  = { workspace = true }
miden-tx       = { features = ["concurrent", "testing"], workspace = true }
serial_test    = { workspace = true }
