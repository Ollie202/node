cargo-features = ["trim-paths"]

[package]
name = "counter-contract"
description = "Network monitor counter account component"
version = "0.1.0"
edition = "2024"

[workspace]

[lib]
crate-type = ["cdylib"]

[dependencies]
miden = "0.12"

[package.metadata.component]
package = "miden:monitor-counter-contract"

[package.metadata.miden]
project-kind = "account"
supported-types = ["RegularAccountUpdatableCode"]

[profile.release]
trim-paths = ["diagnostics", "object"]

[profile.dev]
trim-paths = ["diagnostics", "object"]
