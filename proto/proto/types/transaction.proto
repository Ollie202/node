syntax = "proto3";
package transaction;

import "types/account.proto";
import "types/note.proto";
import "types/primitives.proto";

// TRANSACTION
// ================================================================================================

// Submits proven transaction to the Miden network.
message ProvenTransaction {
  // The transaction proof.
  //
  // Encoded using [miden_protocol::transaction::ProvenTransaction::to_bytes].
  bytes transaction = 1;
  // The inputs used for the transaction proof.
  //
  // Encoded using [miden_protocol::transaction::TransactionInputs::to_bytes].
  optional bytes transaction_inputs = 2;
}

message TransactionBatch {
  // The batch proof.
  //
  // Encoded using [miden_protocol::batch::ProvenBatch::to_bytes].
  bytes batch_proof = 1;
  // The batch contents of the given proof.
  //
  // Encoded using [miden_protocol::batch::ProposedBatch::to_bytes].
  optional bytes proposed_batch = 2;
  // The transaction inputs for each transaction in the batch.
  //
  // Must match the transaction ordering in the batch.
  //
  // Encoded using [miden_protocol::transaction::TransactionInputs::to_bytes].
  repeated bytes transaction_inputs = 3;
}

// Represents a transaction ID.
message TransactionId {
  // The transaction ID.
  primitives.Digest id = 1;
}

// Represents a transaction summary.
message TransactionSummary {
  // A unique 32-byte identifier of a transaction.
  TransactionId transaction_id = 1;

  // The block number in which the transaction was executed.
  fixed32 block_num = 2;

  // The ID of the account affected by the transaction.
  account.AccountId account_id = 3;
}

// Represents a commitment to an input note of a transaction.
//
// For authenticated notes, only the nullifier is present.
// For unauthenticated notes, the note header is also included.
message InputNoteCommitment {
  // The nullifier of the input note.
  primitives.Digest nullifier = 1;

  // The note header, present only for unauthenticated input notes.
  optional note.NoteHeader header = 2;
}

// Represents a transaction header.
message TransactionHeader {
  // The unique identifier of the transaction.
  TransactionId transaction_id = 1;

  // ID of the account against which the transaction was executed.
  account.AccountId account_id = 2;

  // State commitment of the account before the transaction was executed.
  primitives.Digest initial_state_commitment = 3;

  // State commitment of the account after the transaction was executed.
  primitives.Digest final_state_commitment = 4;

  // Input notes of the transaction.
  repeated InputNoteCommitment input_notes = 5;

  // Output notes of the transaction together with their inclusion proofs.
  repeated note.NoteSyncRecord output_notes = 6;

  // The fee paid by the transaction.
  primitives.Asset fee = 7;
}
