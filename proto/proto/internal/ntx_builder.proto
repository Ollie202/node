// Internal gRPC API for the network transaction builder component.
syntax = "proto3";
package ntx_builder;

import "rpc.proto";
import "types/note.proto";

// NTX BUILDER API
// ================================================================================================

// API for querying network transaction builder state.
service Api {
    // Returns the current status of a network note.
    //
    // The status indicates where the note is in its lifecycle: pending execution,
    // processed (consumed by a transaction in the mempool), or discarded after too
    // many failed attempts.
    //
    // Returns `NOT_FOUND` if the note ID is not tracked by the network transaction builder.
    rpc GetNetworkNoteStatus(note.NoteId) returns (rpc.GetNetworkNoteStatusResponse) {}
}
