services:
  genesis:
    image: miden-node-image
    pull_policy: if_not_present
    profiles:
      - genesis
    volumes:
      - genesis-data:/genesis
      - store-data:/store
      - validator-data:/validator
      - accounts:/accounts
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        echo "Bootstrapping validator (creating genesis block)..."
        miden-node validator bootstrap \
          --data-directory /validator \
          --genesis-block-directory /genesis \
          --accounts-directory /accounts
        echo "Bootstrapping store..."
        miden-node store bootstrap \
          --data-directory /store \
          --genesis-block /genesis/genesis.dat

  store:
    image: miden-node-image
    pull_policy: if_not_present
    volumes:
      - store-data:/data
    environment:
      - MIDEN_NODE_ENABLE_OTEL=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4317
      - OTEL_SERVICE_NAME=store
    command:
      - miden-node
      - store
      - start
      - --rpc.url=http://0.0.0.0:50001
      - --ntx-builder.url=http://0.0.0.0:50002
      - --block-producer.url=http://0.0.0.0:50003
      - --data-directory=/data
      - --account_tree.rocksdb.max_cache_size=4294967296
      - --account_tree.rocksdb.max_open_fds=512
      - --nullifier_tree.rocksdb.max_cache_size=4294967296
      - --nullifier_tree.rocksdb.max_open_fds=512
    ports:
      - "50001:50001"
      - "50002:50002"
      - "50003:50003"

  validator:
    image: miden-node-image
    pull_policy: if_not_present
    volumes:
      - validator-data:/data
    environment:
      - MIDEN_NODE_ENABLE_OTEL=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4317
      - OTEL_SERVICE_NAME=validator
    command:
      - miden-node
      - validator
      - start
      - http://0.0.0.0:50101
      - --data-directory=/data
    ports:
      - "50101:50101"

  block-producer:
    image: miden-node-image
    pull_policy: if_not_present
    environment:
      - MIDEN_NODE_ENABLE_OTEL=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4317
      - OTEL_SERVICE_NAME=block-producer
    command:
      - miden-node
      - block-producer
      - start
      - http://0.0.0.0:50201
      - --store.url=http://store:50003
      - --validator.url=http://validator:50101
    ports:
      - "50201:50201"

  rpc:
    image: miden-node-image
    pull_policy: if_not_present
    environment:
      - MIDEN_NODE_ENABLE_OTEL=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4317
      - OTEL_SERVICE_NAME=rpc
    command:
      - miden-node
      - rpc
      - start
      - --url=http://0.0.0.0:57291
      - --store.url=http://store:50001
      - --block-producer.url=http://block-producer:50201
      - --validator.url=http://validator:50101
    ports:
      - "57291:57291"

  ntx-builder:
    image: miden-node-image
    pull_policy: if_not_present
    volumes:
      - ntx-builder-data:/data
    environment:
      - MIDEN_NODE_ENABLE_OTEL=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4317
      - OTEL_SERVICE_NAME=ntx-builder
    command:
      - miden-node
      - ntx-builder
      - start
      - --store.url=http://store:50002
      - --block-producer.url=http://block-producer:50201
      - --validator.url=http://validator:50101
      - --data-directory=/data

  tempo:
    image: grafana/tempo:2.10.4
    volumes:
      - ./compose/tempo/tempo.yaml:/etc/tempo.yaml
    command: ["-config.file=/etc/tempo.yaml"]
    ports:
      - "3200:3200"
      - "4317:4317"

  grafana:
    image: grafana/grafana:12.4
    volumes:
      - ./compose/grafana/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
      - ./compose/grafana/dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml
      - ./compose/grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/miden-node.json
    ports:
      - "3000:3000"
    depends_on:
      - tempo

  monitor:
    image: miden-network-monitor-image
    pull_policy: if_not_present
    command:
      - miden-network-monitor
      - start
    environment:
      - MIDEN_MONITOR_RPC_URL=http://rpc:57291
      - MIDEN_MONITOR_PORT=3001
      - MIDEN_MONITOR_NETWORK_NAME=Localhost
      - MIDEN_MONITOR_DISABLE_NTX_SERVICE=true
      - MIDEN_MONITOR_ENABLE_OTEL=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4317
      - OTEL_SERVICE_NAME=monitor
    ports:
      - "3001:3001"

volumes:
  genesis-data:
  store-data:
  validator-data:
  ntx-builder-data:
  accounts:
